filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /logs/security.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      log_type: security_raw
    fields_under_root: true

  - type: log
    enabled: true
    paths:
      - /logs/alerts.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      log_type: siem_alert
    fields_under_root: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]

setup.kibana:
  host: "http://kibana:5601"

logging.level: info
